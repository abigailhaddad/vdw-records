  ap_clean_pill: clean
  ap_clean: "No monochromatic progression of length {t}. Drop to 2 colors and it gets much harder."
  ap_found_pill: "{count} found"
  ap_found: "{count} monochromatic progression{s} of length {t}, outlined. Recolor an outlined cell to break {them}."

  ss_line: "Colorings of the first **{N}** numbers with **{r}** colors: `{count}`."
  ss_bignum: "{r}<sup>{N}</sup> ≈ a {digits}-digit number"
  ss_over: "That's already bigger than the number of atoms in the universe (81 digits)."
  ss_under: "There are about 10⁸⁰ atoms in the universe, an 81-digit number."

  legend_class: class
  rp_legend_note: "— outline = longest run"
  rp_prefix: "Coloring of **1…{max}** &nbsp;·&nbsp; longest run = **{best}**"
  rp_pill_ok: "run &lt; {t} ✓"
  rp_pill_no: "run ≥ {t}"
  rp_valid: "short enough for length {t}. Proves `W(3,{t}) > {bound}`."
  rp_invalid: "too long for length {t}. Raise the length or try a bigger prime."

  lv_row_run: longest run
  lv_row_record: W(3,25) record it sets
  lv_row_primes: primes you have to test
  lv_readout: >-
    A prime near `{p}` has a longest run around **{run}**, so it sets a record
    for every length past {run} at once. The record scales with the prime; the
    run barely moves. Ten times the prime, ten times every record.
