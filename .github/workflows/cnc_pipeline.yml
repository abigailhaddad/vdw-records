name: vdw-cnc-pipeline

# Cube-and-conquer for ONE palindromic pdw(2;3,t) instance at length N.
# Splits the formula into cubes with march_cu (a look-ahead solver), then
# shards the cubes across many parallel jobs, each running iglucose on its
# slice. This is how the exact van der Waerden / Schur / Pythagorean-triple
# numbers were settled, and it is what turns an instance that a single 6h
# job can't finish into thousands of independent sub-second solves. See
# code/vdw_cnc.py for the soundness argument (all cubes UNSAT => UNSAT; any
# cube SAT => SAT + a verified palindromic witness).
#
# tools/CnC is an embedded upstream checkout of github.com/marijnheule/CnC
# that is NOT tracked in this repo, so build_tools clones and builds
# march_cu + iglucose fresh on the Linux runner and ships them as an
# artifact; the split/conquer jobs point $MARCH_CU / $IGLUCOSE at them.

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      t:
        description: "t in pdw(2;3,t) -- back-compat instance spec, used ONLY when lengths is left empty (see resolve_instance in code/vdw_cnc.py)"
        default: "26"
      lengths:
        description: "FULL-mode instance: comma-separated AP lengths, e.g. 6,6 for the diagonal W(6,2). Leave EMPTY for the default pdw(2;3,t) behavior (back-compat, unchanged) -- setting this switches the whole run to the full non-palindromic encoder, the only encoding a W(k,2) claim may come from."
        default: ""
      encoding:
        description: "palindromic or full. Only consulted when lengths is set (empty lengths always uses palindromic via --t, regardless of this value)"
        default: "full"
        type: choice
        options: ["full", "palindromic"]
      N:
        description: "length N to decide (SAT = good partition exists; UNSAT = none)"
        default: "635"
      nshards:
        description: "number of parallel conquer jobs to split the cubes across (16 keeps a slot free under the free concurrent-job cap so regression et al. aren't queued behind a big run)"
        default: "16"
      cube_indices:
        description: "re-dispatch: comma-separated GLOBAL cube indices to solve (leave empty for a full round-robin run). Split contiguously across nshards jobs."
        default: ""
      parent_cube:
        description: "DISTRIBUTED RE-SPLIT (NOTES.md t=26 STATE): global cube index to re-split into its OWN children and conquer THOSE across nshards jobs, instead of grinding the cube sequentially inside one job's max_resplit_depth path (motivation: t=26 cubes 2780/3675/3866 each burned up to ~21000s in one job while 17+ other runners sat idle). Leave EMPTY for unchanged, byte-compatible top-level dispatch. When set, this run's verdict.json decides ONLY this parent cube's children (see its `scope` field) -- close the parent in the overall instance decision with `vdw_cnc.py aggregate --merge-jsonl` over this run + the top-level campaign's committed results."
        default: ""
      march_opts:
        description: "march_cu split options (deeper -d or -l limit = more, smaller cubes)"
        default: "-d 16"
      cap_seconds:
        description: "per-CUBE solver timeout in seconds. Deliberately SMALL: a timed-out cube is re-split (see max_resplit_depth), which clears the heavy tail far faster than letting one stubborn cube burn the whole cap."
        default: "60"
      max_resplit_depth:
        description: "adaptive: re-split a timed-out cube this many levels before giving up (0=off). 3 reliably clears the hard tail near the frontier."
        default: "3"
      resplit_march_opts:
        description: "march_cu options for re-splitting a hard cube"
        default: "-d 6"
      batch_size:
        description: "cubes per iglucose call (one process solves the whole batch, reusing learned clauses; SAT/timeout falls back to per-cube). 1 = exact per-cube path."
        default: "200"
      budget_core_hours:
        description: "pilot gate: block the fan-out if the projected total exceeds this many core-hours (set force=true to override)"
        default: "40"
      force:
        description: "skip the pilot budget gate and fan out regardless"
        default: "false"
        type: choice
        options: ["false", "true"]
      timeout_minutes:
        description: "per-shard job timeout (<=360 on standard public runners)"
        default: "350"
      certified:
        description: "have each cube emit its DRAT proof (for later stitching)"
        default: "false"
        type: choice
        options: ["false", "true"]

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
      nshards: ${{ steps.gen.outputs.nshards }}
    steps:
      - id: gen
        env:
          NSHARDS: ${{ inputs.nshards }}
          CUBE_INDICES: ${{ inputs.cube_indices }}
        # Full run: matrix is just [{shard:0}..{shard:n-1}] and each conquer
        # job solves its round-robin slice. Re-dispatch (cube_indices set):
        # split that explicit list into n contiguous chunks and hand each job
        # its chunk via matrix.cube_indices; the effective shard count drops
        # to at most the number of cubes so aggregate's --expected-nshards
        # matches the jobs that actually run.
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json, os
          n = int(os.environ["NSHARDS"])
          ci = os.environ.get("CUBE_INDICES", "").replace(",", " ").split()
          if ci:
              idx = [int(x) for x in ci]
              n = max(1, min(n, len(idx)))
              k, m = divmod(len(idx), n)
              chunks = [idx[i * k + min(i, m):(i + 1) * k + min(i + 1, m)]
                        for i in range(n)]
              matrix = [{"shard": i,
                         "cube_indices": ",".join(str(g) for g in chunks[i])}
                        for i in range(n)]
          else:
              matrix = [{"shard": i} for i in range(n)]
          print("matrix=" + json.dumps(matrix))
          print("nshards=" + str(n))
          PY
          echo "setup: $(tail -2 "$GITHUB_OUTPUT")"

  build_tools:
    runs-on: ubuntu-latest
    steps:
      # Key the cache on upstream CnC's current commit + runner OS: the
      # binaries only change when upstream does, so most runs restore them and
      # skip the clone+make entirely.
      - id: rev
        run: |
          sha=$(git ls-remote https://github.com/marijnheule/CnC.git HEAD | cut -f1)
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          echo "upstream CnC HEAD: $sha"
      - id: cache
        uses: actions/cache@v4
        with:
          path: pkg/cncbin
          key: cnc-tools-${{ runner.os }}-${{ steps.rev.outputs.sha }}
      - name: apt prerequisites
        if: steps.cache.outputs.cache-hit != 'true'
        run: sudo apt-get update -y && sudo apt-get install -y build-essential git
      - name: clone + build march_cu and iglucose
        if: steps.cache.outputs.cache-hit != 'true'
        # march_cu is old C with globals declared in a shared header; GCC 10+
        # defaults to -fno-common, which turns those into "multiple
        # definition" link errors. CC="gcc -fcommon" restores the old
        # behaviour (Apple clang tolerates it, which is why it builds on a
        # mac). Command-line CC overrides the Makefile's `CC = gcc`.
        run: |
          git clone --depth 1 https://github.com/marijnheule/CnC.git /tmp/CnC
          ( cd /tmp/CnC/march_cu && make CC="gcc -fcommon" )
          ( cd /tmp/CnC/iglucose/core && make )
          mkdir -p pkg/cncbin
          cp /tmp/CnC/march_cu/march_cu pkg/cncbin/
          cp /tmp/CnC/iglucose/core/iglucose pkg/cncbin/
          chmod +x pkg/cncbin/*
      - name: package binaries (from cache or fresh build)
        run: |
          chmod +x pkg/cncbin/*
          tar -C pkg -czf cnc-tools.tar.gz cncbin
      - uses: actions/upload-artifact@v4
        with:
          name: cnc-tools
          path: cnc-tools.tar.gz

  split:
    needs: build_tools
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: cnc-tools
      - name: unpack tools
        run: |
          tar -xzf cnc-tools.tar.gz
          chmod +x cncbin/*
      # Resolve the back-compat instance spec ONCE per job (matches
      # resolve_instance() in code/vdw_cnc.py -- lengths empty = pdw via
      # --t, unchanged; lengths set = full mode). SLUG mirrors
      # instance_slug() exactly so this job's hand-built filenames agree
      # with what vdw_cnc.py itself writes (palindromic: t{t}_N{N}, byte-
      # identical to the pre-diagonal-campaign naming; full: w{lengths..}_N{N}).
      # CNF_SLUG/PARENT_FLAG (DISTRIBUTED RE-SPLIT, NOTES.md t=26 STATE):
      # when parent_cube is set, the cnf/cubes that actually get conquered
      # are the PARENT's children (cnc_<SLUG>.parent<P>.{cnf,cubes}, from
      # do_split_parent), not the plain top-level split -- CNF_SLUG is what
      # every downstream step (pilot, conquer) should point --cnf/--cubes
      # at. Empty parent_cube -> CNF_SLUG == SLUG and PARENT_FLAG empty,
      # i.e. byte-identical to the pre-existing behavior.
      - name: resolve instance args
        run: |
          if [ -n "${{ inputs.lengths }}" ]; then
            inst_args="--lengths ${{ inputs.lengths }} --encoding ${{ inputs.encoding }}"
            slug="w$(echo '${{ inputs.lengths }}' | tr ',' '_' | tr -d ' ')_N${{ inputs.N }}"
          else
            inst_args="--t ${{ inputs.t }}"
            slug="t${{ inputs.t }}_N${{ inputs.N }}"
          fi
          cnf_slug="$slug"
          parentflag=""
          if [ -n "${{ inputs.parent_cube }}" ]; then
            cnf_slug="${slug}.parent${{ inputs.parent_cube }}"
            parentflag="--parent-cube ${{ inputs.parent_cube }}"
          fi
          echo "INST_ARGS=$inst_args" >> "$GITHUB_ENV"
          echo "SLUG=$slug" >> "$GITHUB_ENV"
          echo "CNF_SLUG=$cnf_slug" >> "$GITHUB_ENV"
          echo "PARENT_FLAG=$parentflag" >> "$GITHUB_ENV"
          echo "resolved: INST_ARGS='$inst_args' SLUG='$slug' CNF_SLUG='$cnf_slug' PARENT_FLAG='$parentflag'"
      # Always regenerate the plain top-level split first -- march_cu is
      # deterministic given the same CNF + march_opts, so this reproduces
      # the ORIGINAL top-level cube file byte-for-byte (same practice the
      # existing --cube-indices re-dispatch already relies on: march_opts
      # here MUST match the original top-level split's). In DISTRIBUTED
      # RE-SPLIT mode (parent_cube set), that regenerated file is also
      # do_split_parent's default source for the parent cube's literals
      # (--parent-cubes-file defaults to exactly this sibling file) -- so
      # the second `split` call below needs no extra wiring to find it.
      - name: split into cubes
        env:
          MARCH_CU: ${{ github.workspace }}/cncbin/march_cu
          IGLUCOSE: ${{ github.workspace }}/cncbin/iglucose
        run: |
          mkdir -p cnc_out
          python3 code/vdw_cnc.py split $INST_ARGS --N ${{ inputs.N }} \
            --march-opts "${{ inputs.march_opts }}" \
            --outdir cnc_out --json-out cnc_out/split.json \
            | tee cnc_out/split.log
          if [ -n "$PARENT_FLAG" ]; then
            python3 code/vdw_cnc.py split $INST_ARGS --N ${{ inputs.N }} \
              $PARENT_FLAG --march-opts "${{ inputs.march_opts }}" \
              --outdir cnc_out --json-out cnc_out/split_parent.json \
              | tee -a cnc_out/split.log
          fi
      # Pilot BEFORE the fan-out: sample cubes, project the total core-hours,
      # and FAIL this job (so conquer, which needs split, is skipped) if the
      # projection blows the budget -- unless force=true. This is the guard the
      # killed t=26 -d16 run (~15 job-hours wasted) needed. Runs in the same
      # job so a block prevents the artifact upload too. Points at CNF_SLUG
      # (the parent's children in DISTRIBUTED RE-SPLIT mode) -- pilot itself
      # needs no changes, since a parent-split cube file is just an ordinary
      # flat cube list from its perspective (see do_split_parent).
      - name: pilot -- project cost, gate the fan-out
        env:
          MARCH_CU: ${{ github.workspace }}/cncbin/march_cu
          IGLUCOSE: ${{ github.workspace }}/cncbin/iglucose
        run: |
          forceflag=""
          [ "${{ inputs.force }}" = "true" ] && forceflag="--force"
          python3 code/vdw_cnc.py pilot $INST_ARGS --N ${{ inputs.N }} \
            --cnf cnc_out/cnc_${CNF_SLUG}.cnf \
            --cubes cnc_out/cnc_${CNF_SLUG}.cubes \
            --budget-core-hours ${{ inputs.budget_core_hours }} $forceflag \
            --outdir cnc_out --json-out cnc_out/pilot.json \
            | tee -a "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v4
        with:
          name: cnc-instance
          path: |
            cnc_out/*.cnf
            cnc_out/*.cubes
            cnc_out/split.json
            cnc_out/split_parent.json
            cnc_out/split.log
            cnc_out/pilot.json

  conquer:
    needs: [setup, split, build_tools]
    runs-on: ubuntu-latest
    timeout-minutes: ${{ fromJSON(inputs.timeout_minutes) }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.setup.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: cnc-tools
      - uses: actions/download-artifact@v4
        with:
          name: cnc-instance
          path: cnc_out
      - name: unpack tools
        run: |
          tar -xzf cnc-tools.tar.gz
          chmod +x cncbin/*
      # Same resolution as the split job (separate runner, so recomputed here
      # -- see the comment there). CNF_SLUG/PARENT_FLAG: see the split job's
      # comment -- empty parent_cube means byte-identical to before.
      - name: resolve instance args
        run: |
          if [ -n "${{ inputs.lengths }}" ]; then
            inst_args="--lengths ${{ inputs.lengths }} --encoding ${{ inputs.encoding }}"
            slug="w$(echo '${{ inputs.lengths }}' | tr ',' '_' | tr -d ' ')_N${{ inputs.N }}"
          else
            inst_args="--t ${{ inputs.t }}"
            slug="t${{ inputs.t }}_N${{ inputs.N }}"
          fi
          cnf_slug="$slug"
          parentflag=""
          if [ -n "${{ inputs.parent_cube }}" ]; then
            cnf_slug="${slug}.parent${{ inputs.parent_cube }}"
            parentflag="--parent-cube ${{ inputs.parent_cube }}"
          fi
          echo "INST_ARGS=$inst_args" >> "$GITHUB_ENV"
          echo "SLUG=$slug" >> "$GITHUB_ENV"
          echo "CNF_SLUG=$cnf_slug" >> "$GITHUB_ENV"
          echo "PARENT_FLAG=$parentflag" >> "$GITHUB_ENV"
          echo "resolved: INST_ARGS='$inst_args' SLUG='$slug' CNF_SLUG='$cnf_slug' PARENT_FLAG='$parentflag'"
      - name: conquer this shard's cube slice
        env:
          MARCH_CU: ${{ github.workspace }}/cncbin/march_cu
          IGLUCOSE: ${{ github.workspace }}/cncbin/iglucose
        run: |
          certflag=""
          [ "${{ inputs.certified }}" = "true" ] && certflag="--certified"
          ciflag=""
          [ -n "${{ matrix.cube_indices }}" ] && ciflag="--cube-indices ${{ matrix.cube_indices }}"
          python3 code/vdw_cnc.py conquer $INST_ARGS --N ${{ inputs.N }} \
            --cnf cnc_out/cnc_${CNF_SLUG}.cnf \
            --cubes cnc_out/cnc_${CNF_SLUG}.cubes \
            --shard ${{ matrix.shard }} --nshards ${{ needs.setup.outputs.nshards }} \
            --cap-seconds ${{ inputs.cap_seconds }} $certflag $ciflag $PARENT_FLAG \
            --max-resplit-depth ${{ inputs.max_resplit_depth }} \
            --resplit-march-opts "${{ inputs.resplit_march_opts }}" \
            --batch-size ${{ inputs.batch_size }} \
            --outdir cnc_out --json-out cnc_out/shard-${{ matrix.shard }}.json \
            | tee cnc_out/shard-${{ matrix.shard }}.log
      # always(): a shard that hits the job wall still uploads its log (each
      # cube result is flushed as it lands), so partial progress and which
      # cubes remain unresolved is never lost.
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-shard-${{ matrix.shard }}
          path: |
            cnc_out/shard-${{ matrix.shard }}.json
            cnc_out/shard-${{ matrix.shard }}.jsonl
            cnc_out/shard-${{ matrix.shard }}.log

  collect:
    needs: [conquer, setup]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - uses: actions/download-artifact@v4
        with:
          pattern: results-shard-*
          path: results
          merge-multiple: true
      - name: aggregate the shard verdicts
        run: |
          python3 code/vdw_cnc.py aggregate --results-dir results \
            --expected-nshards ${{ needs.setup.outputs.nshards }} \
            --outdir results --json-out results/verdict.json \
            | tee "$GITHUB_STEP_SUMMARY"
          echo >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat results/verdict.json >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v4
        with:
          name: cnc-verdict
          path: results/
      - name: commit results back to the repo
        run: |
          git config user.name "vdw-cnc-pipeline[bot]"
          git config user.email "actions@users.noreply.github.com"
          # Distinguish full-mode (diagonal etc.) result dirs from the
          # existing pdw naming, so the two campaigns' committed artifacts
          # never collide (e.g. cnc-w-6-6-N1131-run-<id> vs the unchanged
          # cnc-run-<id> for the default pdw path).
          if [ -n "${{ inputs.lengths }}" ]; then
            tag="w-$(echo '${{ inputs.lengths }}' | tr ',' '-' | tr -d ' ')-N${{ inputs.N }}"
            dir="gh_actions_results/cnc-${tag}-run-${{ github.run_id }}"
            label="w(${{ inputs.lengths }}) N=${{ inputs.N }} [${{ inputs.encoding }}]"
          else
            dir="gh_actions_results/cnc-run-${{ github.run_id }}"
            label="pdw(2;3,${{ inputs.t }}) N=${{ inputs.N }}"
          fi
          # DISTRIBUTED RE-SPLIT (NOTES.md t=26 STATE): the dir naming stays
          # unchanged (run_id is already a unique key, same as any other
          # re-dispatch run) -- only the commit-message label calls out the
          # scope explicitly, so `git log` alone makes clear this commit is
          # NOT a full-instance verdict (the JSON's own "scope" field is the
          # authoritative version -- see aggregate()/verdict.json).
          if [ -n "${{ inputs.parent_cube }}" ]; then
            label="${label} [DISTRIBUTED RE-SPLIT: parent cube ${{ inputs.parent_cube }} only]"
          fi
          mkdir -p "$dir"
          cp -r results/* "$dir/" 2>/dev/null || true
          git add "$dir"
          if git diff --cached --quiet; then
            echo "nothing to commit"; exit 0
          fi
          git commit -m "GH Actions: vdw-cnc-pipeline $label (run ${{ github.run_id }})"
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push origin main && break
            echo "push attempt $i failed, retrying..."; sleep 5
          done
