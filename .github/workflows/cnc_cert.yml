name: vdw-cnc-cert

# Tier A "verified-decision certificate" (PLAN_distributed_cert.md): for an
# instance code/vdw_cnc.py's cnc_pipeline has ALREADY decided UNSAT, produce
# a per-cube LRAT refutation, VERIFY it with lrat-check, discard the (large)
# proof, and keep only small metadata (checker verdict + sha256 + sizes) --
# plus a small "cover" certificate (refutation of negcubes.cnf, the
# cover-completeness CNF) that IS kept, proving the cube set exhausted the
# whole search space. This is the trust model of the big SAT results
# (Pythagorean triples etc.): proofs too big to keep, verify-and-discard with
# a checker. See PLAN_distributed_cert.md for the full design/soundness
# writeup -- this workflow mirrors cnc_pipeline.yml's shape (same build_tools
# caching pattern, same shard matrix, same artifact/commit conventions) but
# is a COMPLETELY SEPARATE mode: it never touches conquer/aggregate, and its
# concurrency group is prefixed "cnc-cert-" specifically so it can never
# collide/serialize with a live cnc_pipeline decision run of the same
# instance (both can run at once -- cert only needs an instance already
# known UNSAT, it doesn't decide anything itself).
#
# tools/CnC (march_cu, for regenerating the split only -- cert never calls
# iglucose) and github.com/arminbiere/{cadical,lrat-trim} plus
# github.com/marijnheule/drat-trim (lrat-check) are NOT tracked in this repo
# (like cnc_pipeline.yml's march_cu/iglucose), so build_tools clones/builds
# all four fresh on the runner.
#
# cake_lpr (github.com/tanyongkiam/cake_lpr, Tan/Heule/Myreen's CakeML
# FORMALLY VERIFIED LPR/LRAT proof checker) is a SECOND, must-also-pass
# Tier-A checker, built alongside the other four at a PINNED commit (see
# build_tools' cake_lpr_rev step) -- unlike lrat-check (an ordinary C
# program trusted by inspection), cake_lpr's own checking code is itself
# machine-checked correct. It is built ALWAYS (part of the same cached
# tools tarball), but only EXPORTED to the cert/cover jobs (as $CAKE_LPR)
# when the use_cake_lpr input is 'true' (the default) -- 'false' means the
# env var is simply never set, so code/vdw_cnc.py's cert path runs
# lrat-check-only, byte-identical to before cake_lpr existed.

permissions:
  contents: write

concurrency:
  # "cnc-cert-" prefix (never bare "cnc-") is deliberate: cnc_pipeline.yml's
  # decision-pipeline group is "cnc-<instance>-<N>-<parent>" -- this run must
  # NEVER share a group with (and therefore never queue behind) a live
  # decision run of the same instance. Cert only reads an already-split,
  # already-decided instance; it has no reason to serialize with conquer.
  group: cnc-cert-${{ inputs.lengths || inputs.t }}-${{ inputs.N }}
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      t:
        description: "t in pdw(2;3,t) -- back-compat instance spec, used ONLY when lengths is left empty (see resolve_instance in code/vdw_cnc.py)"
        default: "26"
      lengths:
        description: "FULL-mode instance: comma-separated AP lengths, e.g. 6,6 for the diagonal W(6,2). Leave EMPTY for the default pdw(2;3,t) behavior."
        default: ""
      encoding:
        description: "palindromic or full. Only consulted when lengths is set"
        default: "full"
        type: choice
        options: ["full", "palindromic"]
      N:
        description: "length N to certify UNSAT (must already be a DECIDED UNSAT instance from cnc_pipeline -- cert does not decide, only certifies)"
        default: "635"
      nshards:
        description: "number of parallel cert jobs to split the cubes across"
        default: "16"
      cube_indices:
        description: "re-dispatch: comma-separated GLOBAL cube indices to certify (leave empty for a full round-robin run). Split contiguously across nshards jobs -- same contract as cnc_pipeline.yml's cube_indices input."
        default: ""
      march_opts:
        description: "march_cu split options -- MUST MATCH the original decision-pipeline split's march_opts exactly (march_cu is deterministic given the same CNF + options, so this reproduces the SAME cube file the decision was made against)"
        default: "-d 16"
      expected_ncubes:
        description: "byte-check: abort setup if the regenerated split's cube count differs from this (the officially decided run's recorded cube count). Leave empty to skip the check."
        default: ""
      cap_seconds:
        description: "per-CUBE cadical timeout in seconds. No re-split exists in cert mode (unlike conquer) -- a capped-out cube just gets DISK_SKIP/TIMEOUT recorded and re-dispatches later with a bigger cap; deliberately generous default since the volume/time projection in PLAN_distributed_cert.md shows cadical is usually faster than the iglucose decision run."
        default: "3600"
      min_free_gb:
        description: "disk guard: skip (not crash) a cube if free disk falls below this many GB"
        default: "2"
      timeout_minutes:
        description: "per-shard job timeout (<=360 on standard public runners)"
        default: "350"
      use_cake_lpr:
        description: "run cake_lpr (Tan/Heule/Myreen's CakeML FORMALLY VERIFIED LPR/LRAT checker, github.com/tanyongkiam/cake_lpr) as a SECOND, must-also-pass checker alongside lrat-check, for every cube and the cover. 'false' exports no $CAKE_LPR at all -- lrat-check-only, matching pre-cake_lpr behavior."
        default: "true"
        type: choice
        options: ["true", "false"]

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
      nshards: ${{ steps.gen.outputs.nshards }}
    steps:
      - id: gen
        env:
          NSHARDS: ${{ inputs.nshards }}
          CUBE_INDICES: ${{ inputs.cube_indices }}
        # Identical matrix-generation logic to cnc_pipeline.yml's setup job
        # (full run: one shard per matrix entry; cube_indices set: split that
        # list contiguously across at most nshards jobs).
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json, os
          n = int(os.environ["NSHARDS"])
          ci = os.environ.get("CUBE_INDICES", "").replace(",", " ").split()
          if ci:
              idx = [int(x) for x in ci]
              n = max(1, min(n, len(idx)))
              k, m = divmod(len(idx), n)
              chunks = [idx[i * k + min(i, m):(i + 1) * k + min(i + 1, m)]
                        for i in range(n)]
              matrix = [{"shard": i,
                         "cube_indices": ",".join(str(g) for g in chunks[i])}
                        for i in range(n)]
          else:
              matrix = [{"shard": i} for i in range(n)]
          print("matrix=" + json.dumps(matrix))
          print("nshards=" + str(n))
          PY
          echo "setup: $(tail -2 "$GITHUB_OUTPUT")"

  build_tools:
    runs-on: ubuntu-latest
    outputs:
      cadical_ref: ${{ steps.cadical_rev.outputs.ref }}
    steps:
      - id: march_rev
        run: |
          sha=$(git ls-remote https://github.com/marijnheule/CnC.git HEAD | cut -f1)
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          echo "upstream CnC HEAD: $sha"
      # cadical: PIN the EXACT known-good release rel-3.0.1 by its commit sha
      # (never upstream HEAD, never a computed "latest" -- a cert tool's exact
      # behavior must be reproducible run over run). rel-3.0.1 is the version
      # that verifies locally (Homebrew cadical 3.0.1, `cadical --version` ->
      # "3.0.1") and accepts the exact flag set we drive it with (--lrat
      # --no-binary --no-factor -> rc 20 on UNSAT).
      #
      # DO NOT reintroduce a version-sort "smallest release >= 3.0.1"
      # heuristic here: upstream carries a junk tag `rel-06w` (a 2006
      # SAT-competition entry) that `sort -V` mis-ranks as version 6, i.e.
      # ABOVE 3.0.1, so that heuristic silently pinned a 2006-era cadical
      # with no --lrat/--no-factor support -> every cube CADICAL_ERR(rc=1),
      # UNDETERMINED verdict (caught by the t=20 N=381 acceptance run,
      # 2026-07-24). An exact sha pin is the only safe form for a cert tool.
      - id: cadical_rev
        env:
          CADICAL_TAG: rel-3.0.1
          CADICAL_SHA: c60730422e758ef1cebe7aeddf2dda31c996bf04
        run: |
          git clone --quiet https://github.com/arminbiere/cadical.git /tmp/cadical_src
          cd /tmp/cadical_src
          # Verify the pinned tag still resolves to the pinned sha (guards
          # against a moved/re-pointed tag upstream); fail LOUD if it drifted.
          resolved=$(git rev-parse "refs/tags/${CADICAL_TAG}^{commit}")
          if [ "$resolved" != "$CADICAL_SHA" ]; then
            echo "FATAL: ${CADICAL_TAG} resolves to $resolved, expected pinned $CADICAL_SHA -- refusing to build an unexpected cadical for a cert run" >&2
            exit 1
          fi
          echo "ref=${CADICAL_TAG}" >> "$GITHUB_OUTPUT"
          echo "sha=${CADICAL_SHA}" >> "$GITHUB_OUTPUT"
          echo "pinned cadical: ref=${CADICAL_TAG} sha=${CADICAL_SHA}"
      # lrat-trim: PIN the exact commit observed during the PLAN_distributed_
      # cert.md builder session (2026-07-23), not upstream HEAD -- see the
      # plan's tool-provenance note. Update this hash deliberately (new PR)
      # if upstream lrat-trim needs to move; never let it silently drift.
      - id: lrat_trim_rev
        run: |
          sha=b30f400f4ee5c32b77ee566a7c006081b521534f
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          echo "pinned lrat-trim: $sha"
      # drat-trim/lrat-check has no version scheme of its own worth pinning
      # by tag -- cnc_prove.yml already clones its HEAD fresh each run for
      # the same reason (drat-trim itself, not lrat-check); match that.
      - id: drat_trim_rev
        run: |
          sha=$(git ls-remote https://github.com/marijnheule/drat-trim.git HEAD | cut -f1)
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          echo "upstream drat-trim HEAD: $sha"
      # cake_lpr: PIN the exact commit observed during the cake_lpr-checker
      # builder session (2026-07-23) -- same never-drift-silently rule as
      # lrat-trim above. Update this hash deliberately (new PR) if upstream
      # cake_lpr needs to move.
      - id: cake_lpr_rev
        run: |
          sha=a36874a8b750b43fe4b385b8ddbf5b033e46a3fa
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          echo "pinned cake_lpr: $sha"
      - id: cache
        uses: actions/cache@v4
        with:
          path: pkg/certbin
          key: cnc-cert-tools-${{ runner.os }}-march${{ steps.march_rev.outputs.sha }}-cad${{ steps.cadical_rev.outputs.sha }}-lrattrim${{ steps.lrat_trim_rev.outputs.sha }}-dt${{ steps.drat_trim_rev.outputs.sha }}-cakelpr${{ steps.cake_lpr_rev.outputs.sha }}
      - name: apt prerequisites
        if: steps.cache.outputs.cache-hit != 'true'
        run: sudo apt-get update -y && sudo apt-get install -y build-essential git
      - name: clone + build march_cu (split regeneration only -- cert never solves with iglucose)
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 https://github.com/marijnheule/CnC.git /tmp/CnC
          ( cd /tmp/CnC/march_cu && make CC="gcc -fcommon" )
          mkdir -p pkg/certbin
          cp /tmp/CnC/march_cu/march_cu pkg/certbin/
      - name: build PINNED cadical (${{ steps.cadical_rev.outputs.ref }})
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          cd /tmp/cadical_src
          git checkout --quiet ${{ steps.cadical_rev.outputs.sha }}
          ./configure && make -j"$(nproc)"
          # cadical's build system drops the binary in build/cadical; a few
          # historical versions built in the source root instead -- try both.
          if [ -f build/cadical ]; then
            cp build/cadical "$GITHUB_WORKSPACE/pkg/certbin/"
          else
            cp cadical "$GITHUB_WORKSPACE/pkg/certbin/"
          fi
      - name: build PINNED lrat-trim (${{ steps.lrat_trim_rev.outputs.sha }})
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          git clone --quiet https://github.com/arminbiere/lrat-trim.git /tmp/lrat-trim-src
          cd /tmp/lrat-trim-src
          git checkout --quiet ${{ steps.lrat_trim_rev.outputs.sha }}
          ./configure && make
          cp lrat-trim "$GITHUB_WORKSPACE/pkg/certbin/"
      - name: build lrat-check (marijnheule/drat-trim, `make lrat-check`)
        if: steps.cache.outputs.cache-hit != 'true'
        # No -fcommon/CC tweak needed here (unlike march_cu) -- lrat-check.c
        # builds clean with plain gcc -std=c99 on ubuntu's default GCC, per
        # the vendored Makefile's own `lrat-check` target.
        run: |
          git clone --depth 1 https://github.com/marijnheule/drat-trim.git /tmp/drat-trim-src
          ( cd /tmp/drat-trim-src && make lrat-check )
          cp /tmp/drat-trim-src/lrat-check "$GITHUB_WORKSPACE/pkg/certbin/"
      - name: clone + build PINNED cake_lpr (${{ steps.cake_lpr_rev.outputs.sha }}, x86-64, 8GB heap / 2GB stack)
        if: steps.cache.outputs.cache-hit != 'true'
        # x86-64 target (plain `make` in cake_lpr's Makefile) -- runners are
        # ubuntu (x86-64), NOT the arm8 target used to build/test this
        # locally on Abigail's mac. -DCML_HEAP_SIZE=8192 -DCML_STACK_SIZE=2048
        # (MB) mirrors the vendored Makefile's own `starexec` target's
        # pattern (64GB heap / 16GB stack there, for starexec's bigger
        # boxes) scaled down to fit these runners' 16GB RAM with headroom
        # for monster proofs at t=26+ scale -- always built (part of the
        # same cached tools tarball as everything else); whether it's
        # actually EXPORTED to cert/cover is decided per-run by
        # inputs.use_cake_lpr, not by whether it got built.
        run: |
          git clone --quiet https://github.com/tanyongkiam/cake_lpr.git /tmp/cake_lpr-src
          cd /tmp/cake_lpr-src
          git checkout --quiet ${{ steps.cake_lpr_rev.outputs.sha }}
          gcc -O2 basis_ffi.c cake_lpr.S -o cake_lpr -std=c99 \
            -DCML_HEAP_SIZE=8192 -DCML_STACK_SIZE=2048
          cp cake_lpr "$GITHUB_WORKSPACE/pkg/certbin/"
      - name: package binaries (from cache or fresh build)
        run: |
          chmod +x pkg/certbin/*
          tar -C pkg -czf cnc-cert-tools.tar.gz certbin
      - uses: actions/upload-artifact@v4
        with:
          name: cnc-cert-tools
          path: cnc-cert-tools.tar.gz

  split:
    needs: build_tools
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: cnc-cert-tools
      - name: unpack tools
        run: |
          tar -xzf cnc-cert-tools.tar.gz
          chmod +x certbin/*
      # Same instance-arg resolution as cnc_pipeline.yml (see its comment) --
      # kept byte-identical so the two workflows can never disagree about
      # what a given (t-or-lengths, N) resolves to on disk.
      - name: resolve instance args
        run: |
          if [ -n "${{ inputs.lengths }}" ]; then
            inst_args="--lengths ${{ inputs.lengths }} --encoding ${{ inputs.encoding }}"
            slug="w$(echo '${{ inputs.lengths }}' | tr ',' '_' | tr -d ' ')_N${{ inputs.N }}"
          else
            inst_args="--t ${{ inputs.t }}"
            slug="t${{ inputs.t }}_N${{ inputs.N }}"
          fi
          echo "INST_ARGS=$inst_args" >> "$GITHUB_ENV"
          echo "SLUG=$slug" >> "$GITHUB_ENV"
          echo "resolved: INST_ARGS='$inst_args' SLUG='$slug'"
      # march_cu is deterministic given the same CNF + march_opts, so this
      # reproduces the ORIGINAL top-level cube file byte-for-byte, exactly
      # like cnc_pipeline.yml's split job relies on for --cube-indices
      # re-dispatch -- march_opts here MUST match the original decision
      # split's, or the cube indices this run certifies won't correspond to
      # the ones the decision pipeline actually verified UNSAT.
      - name: split into cubes
        env:
          MARCH_CU: ${{ github.workspace }}/certbin/march_cu
        run: |
          mkdir -p cnc_out
          python3 code/vdw_cnc.py split $INST_ARGS --N ${{ inputs.N }} \
            --march-opts "${{ inputs.march_opts }}" \
            --outdir cnc_out --json-out cnc_out/split.json \
            | tee cnc_out/split.log
      # Byte-check (PLAN_distributed_cert.md step 1): abort rather than
      # silently certify the wrong split if the regenerated cube count
      # doesn't match the officially decided run's recorded count.
      - name: byte-check cube count against the recorded official split
        if: inputs.expected_ncubes != ''
        run: |
          ncubes=$(python3 -c "import json; print(json.load(open('cnc_out/split.json'))['ncubes'])")
          if [ "$ncubes" != "${{ inputs.expected_ncubes }}" ]; then
            echo "MISMATCH: regenerated split has $ncubes cubes, expected ${{ inputs.expected_ncubes }} (the officially decided run's recorded count) -- march_opts may not match the original split, or the instance differs. ABORTING." >&2
            exit 1
          fi
          echo "byte-check OK: $ncubes cubes matches expected ${{ inputs.expected_ncubes }}"
      # negcubes.cnf (PLAN_distributed_cert.md step 1/2): the cover-
      # completeness CNF, generated in pure Python (no Lean toolchain
      # needed) -- one clause per cube (its negated literals), base NOT
      # included. Verified byte-for-byte against `lake exe lratcatch-export`
      # locally by the builder (see code/test_cnc.py's
      # test_leaf_and_negcubes_match_lratcatch_export).
      - name: generate negcubes.cnf
        run: |
          python3 code/vdw_cnc.py negcubes \
            --cubes cnc_out/cnc_${SLUG}.cubes \
            --negcubes cnc_out/negcubes.cnf \
            --outdir cnc_out --json-out cnc_out/negcubes.json
      - uses: actions/upload-artifact@v4
        with:
          name: cnc-cert-instance
          path: |
            cnc_out/*.cnf
            cnc_out/*.cubes
            cnc_out/negcubes.cnf
            cnc_out/split.json
            cnc_out/split.log
            cnc_out/negcubes.json

  cert:
    needs: [setup, split, build_tools]
    runs-on: ubuntu-latest
    timeout-minutes: ${{ fromJSON(inputs.timeout_minutes) }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.setup.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: cnc-cert-tools
      - uses: actions/download-artifact@v4
        with:
          name: cnc-cert-instance
          path: cnc_out
      - name: unpack tools
        run: |
          tar -xzf cnc-cert-tools.tar.gz
          chmod +x certbin/*
      - name: resolve instance args
        run: |
          if [ -n "${{ inputs.lengths }}" ]; then
            inst_args="--lengths ${{ inputs.lengths }} --encoding ${{ inputs.encoding }}"
            slug="w$(echo '${{ inputs.lengths }}' | tr ',' '_' | tr -d ' ')_N${{ inputs.N }}"
          else
            inst_args="--t ${{ inputs.t }}"
            slug="t${{ inputs.t }}_N${{ inputs.N }}"
          fi
          echo "INST_ARGS=$inst_args" >> "$GITHUB_ENV"
          echo "SLUG=$slug" >> "$GITHUB_ENV"
          echo "resolved: INST_ARGS='$inst_args' SLUG='$slug'"
      # Per-shard cert loop (PLAN_distributed_cert.md step 2): leaf CNF ->
      # cadical --lrat --no-binary --no-factor -> lrat-trim -> lrat-check
      # the TRIMMED proof -> JSONL record -> delete leaf/LRAT files, one
      # cube at a time. Same checkpoint/recovery + --cube-indices
      # re-dispatch contract as cnc_pipeline.yml's conquer job.
      - name: certify this shard's cube slice
        env:
          CADICAL: ${{ github.workspace }}/certbin/cadical
          LRAT_TRIM: ${{ github.workspace }}/certbin/lrat-trim
          LRAT_CHECK: ${{ github.workspace }}/certbin/lrat-check
        run: |
          ciflag=""
          [ -n "${{ matrix.cube_indices }}" ] && ciflag="--cube-indices ${{ matrix.cube_indices }}"
          # use_cake_lpr 'false' -> $CAKE_LPR simply never gets exported, so
          # cert falls back to lrat-check-only (byte-identical behavior).
          [ "${{ inputs.use_cake_lpr }}" = "true" ] && export CAKE_LPR="${{ github.workspace }}/certbin/cake_lpr"
          python3 code/vdw_cnc.py cert $INST_ARGS --N ${{ inputs.N }} \
            --cnf cnc_out/cnc_${SLUG}.cnf \
            --cubes cnc_out/cnc_${SLUG}.cubes \
            --shard ${{ matrix.shard }} --nshards ${{ needs.setup.outputs.nshards }} \
            --cap-seconds ${{ inputs.cap_seconds }} --min-free-gb ${{ inputs.min_free_gb }} \
            $ciflag \
            --outdir cnc_out --json-out cnc_out/cert-shard-${{ matrix.shard }}.json \
            | tee cnc_out/cert-shard-${{ matrix.shard }}.log
      # always(): a shard that hits the job wall still uploads its partial
      # JSONL (each cube's record is flushed as it lands), same recovery
      # story as cnc_pipeline.yml's conquer job.
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cnc-cert-results-shard-${{ matrix.shard }}
          path: |
            cnc_out/cert-shard-${{ matrix.shard }}.json
            cnc_out/cert-shard-${{ matrix.shard }}.jsonl
            cnc_out/cert-shard-${{ matrix.shard }}.log

  cover:
    needs: [split, build_tools]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: cnc-cert-tools
      - uses: actions/download-artifact@v4
        with:
          name: cnc-cert-instance
          path: cnc_out
      - name: unpack tools
        run: |
          tar -xzf cnc-cert-tools.tar.gz
          chmod +x certbin/*
      # Cover step (PLAN_distributed_cert.md step 3): refute negcubes.cnf
      # (proving the cube set exhausts the whole search space) with cadical
      # --lrat --no-binary --no-factor, then lrat-check the result DIRECTLY
      # -- no trim (unlike per-cube certs): cover.lrat is small and is the
      # piece that gets COMMITTED, kept exactly as cadical wrote it.
      - name: refute negcubes.cnf and lrat-check the cover
        env:
          CADICAL: ${{ github.workspace }}/certbin/cadical
          LRAT_CHECK: ${{ github.workspace }}/certbin/lrat-check
        run: |
          # use_cake_lpr 'false' -> $CAKE_LPR simply never gets exported, so
          # cert-cover falls back to lrat-check-only (byte-identical behavior).
          [ "${{ inputs.use_cake_lpr }}" = "true" ] && export CAKE_LPR="${{ github.workspace }}/certbin/cake_lpr"
          python3 code/vdw_cnc.py cert-cover \
            --negcubes cnc_out/negcubes.cnf \
            --cover-out cnc_out/cover.lrat \
            --cap-seconds ${{ inputs.cap_seconds }} \
            --outdir cnc_out --json-out cnc_out/cover.json \
            | tee cnc_out/cover.log
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cnc-cert-cover
          path: |
            cnc_out/cover.lrat
            cnc_out/cover.json
            cnc_out/cover.log

  collect:
    needs: [cert, cover, setup]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - uses: actions/download-artifact@v4
        with:
          pattern: cnc-cert-results-shard-*
          path: results
          merge-multiple: true
      - uses: actions/download-artifact@v4
        with:
          name: cnc-cert-cover
          path: results
      # The tools tarball is downloaded here too, ONLY so cert-aggregate's
      # collect_tool_provenance can record the actual path/sha256/version of
      # every binary the run used (without it, provenance fields resolve to
      # None in the committed verdict -- the gap the cake_lpr builder pass
      # flagged). The collect job never RUNS these tools.
      - uses: actions/download-artifact@v4
        with:
          name: cnc-cert-tools
      - name: unpack tools (for provenance recording only)
        run: |
          tar -xzf cnc-cert-tools.tar.gz
          chmod +x certbin/*
      # cert-aggregate (PLAN_distributed_cert.md step 4): CERT_VERIFIED iff
      # every cube 0..ncubes-1 has checker VERIFIED (cube-level union across
      # every cert-shard-*.jsonl, mirroring the vacuous-UNSAT fix) AND the
      # cover is VERIFIED -- any missing/unverified cube or a missing/
      # unverified cover makes the verdict UNDETERMINED, never a silently-
      # partial CERT_VERIFIED.
      - name: aggregate the cert verdict
        env:
          CADICAL: ${{ github.workspace }}/certbin/cadical
          LRAT_TRIM: ${{ github.workspace }}/certbin/lrat-trim
          LRAT_CHECK: ${{ github.workspace }}/certbin/lrat-check
        run: |
          # use_cake_lpr 'false' -> $CAKE_LPR simply never gets exported, so
          # provenance matches what the cert/cover jobs actually ran.
          [ "${{ inputs.use_cake_lpr }}" = "true" ] && export CAKE_LPR="${{ github.workspace }}/certbin/cake_lpr"
          python3 code/vdw_cnc.py cert-aggregate --results-dir results \
            --cover-json results/cover.json \
            --outdir results --json-out results/verdict.json \
            | tee "$GITHUB_STEP_SUMMARY"
          echo >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat results/verdict.json >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v4
        with:
          name: cnc-cert-verdict
          path: results/
      - name: commit the certificate bundle (verdict + per-cube metadata JSONL + cover.lrat)
        run: |
          git config user.name "vdw-cnc-cert[bot]"
          git config user.email "actions@users.noreply.github.com"
          if [ -n "${{ inputs.lengths }}" ]; then
            label="w(${{ inputs.lengths }}) N=${{ inputs.N }} [${{ inputs.encoding }}]"
          else
            label="pdw(2;3,${{ inputs.t }}) N=${{ inputs.N }}"
          fi
          dir="gh_actions_results/cert-run-${{ github.run_id }}"
          mkdir -p "$dir"
          cp -r results/* "$dir/" 2>/dev/null || true
          git add "$dir"
          if git diff --cached --quiet; then
            echo "nothing to commit"; exit 0
          fi
          git commit -m "GH Actions: vdw-cnc-cert $label (run ${{ github.run_id }})"
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push origin main && break
            echo "push attempt $i failed, retrying..."; sleep 5
          done
