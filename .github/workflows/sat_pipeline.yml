name: vdw-sat-pipeline

# Runs the phase-1 SAT pipeline (code/vdw_pdw_validate.py,
# code/vdw_pdw_attack.py) on GitHub-hosted runners instead of a laptop.
# Manual trigger only -- this is compute-heavy.
#
# ONE INSTANCE PER JOB. The hard direction here is proving a point UNSAT,
# and a single UNSAT instance can want HOURS. GitHub-hosted public runners
# cap a job at 360 minutes (6h), so the only way to give one instance
# hours is to put exactly one instance in one job. You hand this workflow
# a `shards` list -- a JSON array of argument strings, one per job -- and
# it fans them out as a matrix, each with its own multi-hour per-instance
# `cap_seconds`. Examples:
#   runner=validate  shards=["--ts 26 --only p+1","--ts 26 --only q+1"]
#     -> two jobs, each proving one AKS Table-6 UNSAT cell.
#   runner=validate  shards=["--point 28 728 unsat","--point 29 810 unsat"]
#     -> hammer specific frontier ceilings past AKS's t=27, proof-logged.
#   runner=attack    shards=["--ts 28","--ts 29"]
#     -> the exploratory SAT-boundary bracket walk, one t per job.
#
# WHY the previous "one t per job" shape kept dying "cancelled": each probe
# was capped at 30 min internally, a job ran many probes back-to-back, and
# the job's own timeout-minutes wall guillotined it mid-probe (GitHub
# reports a timeout-minutes kill as conclusion=cancelled). Keep
# cap_seconds STRICTLY below timeout_minutes*60 so the solver, not the job
# wall, is what bounds a run.
#
# contents: write so the collect job can commit results back to main with
# the default GITHUB_TOKEN. A broader-scoped PAT is stashed as the repo
# secret GH_PAT for the chain job (GITHUB_TOKEN-triggered dispatches are
# blocked from cascading into other workflow runs by GitHub's loop
# prevention, so chaining needs a real token).
permissions:
  contents: write

# Serialize whole runs: a second dispatch queues (pending) behind a
# running one rather than overlapping. cancel-in-progress is false on
# purpose -- these jobs are long and expensive; never kill one just
# because a newer dispatch arrived. (Shards within a single run still run
# in parallel; this only gates run-vs-run.)
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      runner:
        description: "which script: validate or attack"
        default: "validate"
        type: choice
        options: ["validate", "attack"]
      shards:
        description: 'JSON array of arg-strings, one job each, e.g. ["--ts 26 --only p+1","--ts 26 --only q+1"]'
        default: '["--ts 26 --only p+1","--ts 26 --only q+1"]'
      cap_seconds:
        description: "per-instance solver timeout in seconds (must be < timeout_minutes*60)"
        default: "18000"
      timeout_minutes:
        description: "per-shard job timeout (<=360 on standard public runners)"
        default: "350"
      chain_runner:
        description: "chain: runner for the auto-dispatched next run (empty chain_shards = no chain)"
        default: "validate"
      chain_shards:
        description: "chain: JSON array of arg-strings for the next run. Empty = don't chain."
        default: ""

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
    steps:
      - id: gen
        env:
          SHARDS: ${{ inputs.shards }}
        # Turn the shards array into a matrix `include` list, giving each
        # shard a filesystem-safe slug (used for its log/json names and
        # artifact name) derived from its args, prefixed by index to stay
        # unique even if two shards sanitize to the same string.
        run: |
          matrix=$(python3 - <<'PY'
          import json, os, re
          shards = json.loads(os.environ["SHARDS"])
          out = []
          for i, s in enumerate(shards):
              slug = re.sub(r"[^0-9a-zA-Z]+", "-", s).strip("-").lower()
              out.append({"args": s, "slug": f"{i:02d}-{slug}"})
          print(json.dumps(out))
          PY
          )
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          echo "$matrix"

  build_tools:
    runs-on: ubuntu-latest
    steps:
      - name: apt prerequisites
        run: sudo apt-get update -y && sudo apt-get install -y build-essential git
      - name: build kissat
        run: |
          git clone --depth 1 https://github.com/arminbiere/kissat.git /tmp/kissat
          ( cd /tmp/kissat && ./configure && make -j"$(nproc)" )
      - name: build cadical
        run: |
          git clone --depth 1 https://github.com/arminbiere/cadical.git /tmp/cadical
          ( cd /tmp/cadical && ./configure && make -j"$(nproc)" )
      - name: build drat-trim (incl. lrat-check)
        run: |
          git clone --depth 1 https://github.com/marijnheule/drat-trim.git /tmp/drat-trim
          ( cd /tmp/drat-trim && make )
      - name: package tools/ layout matching the local dev tree
        run: |
          mkdir -p pkg/bin pkg/tools/drat-trim
          cp /tmp/kissat/build/kissat pkg/bin/
          cp /tmp/cadical/build/cadical pkg/bin/
          cp /tmp/drat-trim/drat-trim /tmp/drat-trim/lrat-check pkg/tools/drat-trim/
          chmod +x pkg/bin/* pkg/tools/drat-trim/*
          tar -C pkg -czf sat-tools.tar.gz bin tools
      - uses: actions/upload-artifact@v4
        with:
          name: sat-tools
          path: sat-tools.tar.gz

  run:
    needs: [setup, build_tools]
    runs-on: ubuntu-latest
    timeout-minutes: ${{ fromJSON(inputs.timeout_minutes) }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.setup.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: sat-tools
      - name: unpack tools
        run: |
          tar -xzf sat-tools.tar.gz
          chmod +x bin/* tools/drat-trim/*
          echo "$PWD/bin" >> "$GITHUB_PATH"
      - name: sanity-check binaries
        run: |
          kissat --version || true
          cadical --version || true
          ./tools/drat-trim/drat-trim --help || true
      - name: run shard
        # $ARGS is intentionally unquoted: it is a space-separated arg
        # string (e.g. "--ts 26 --only p+1") that must word-split into
        # separate argv entries. Manual-dispatch-only + repo-owner input,
        # same trust model as the rest of this workflow.
        env:
          ARGS: ${{ matrix.args }}
        run: |
          mkdir -p out
          python3 code/vdw_pdw_${{ inputs.runner }}.py $ARGS \
            --cap-seconds ${{ inputs.cap_seconds }} \
            --outdir out --json-out "out/${{ matrix.slug }}.json" \
            | tee "out/${{ matrix.slug }}.log"
      # if: always() is the whole point: if this shard hits its
      # timeout-minutes cap (or is cancelled), always()-steps still run
      # before teardown, so whatever the script already flushed to
      # out/*.log gets uploaded rather than lost. out/*.json only exists
      # if the script reached its final json.dump() -- so on a mid-shard
      # kill the log is the durable record, which is why collect reads
      # logs, not just JSON.
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-${{ matrix.slug }}
          # CNF/proof files can be large (100s of MB); ship only the logs
          # and JSON summaries, not the raw artifacts.
          path: |
            out/*.log
            out/*.json
          if-no-files-found: warn

  collect:
    needs: run
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - uses: actions/download-artifact@v4
        with:
          pattern: results-*
          path: results
          merge-multiple: true
      - name: summarize
        run: |
          {
            echo "# vdw-sat-pipeline results (runner=${{ inputs.runner }}, cap=${{ inputs.cap_seconds }}s, run ${{ github.run_id }})"
            echo
            echo "shards: ${{ inputs.shards }}"
            echo
            for f in results/*.log; do
              [ -e "$f" ] || continue
              echo "## $(basename "$f")"
              echo '```'
              tail -60 "$f"
              echo '```'
            done
          } | tee "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v4
        with:
          name: results
          path: results/
      - name: commit results back to the repo
        run: |
          git config user.name "vdw-sat-pipeline[bot]"
          git config user.email "actions@users.noreply.github.com"
          mkdir -p "gh_actions_results/run-${{ github.run_id }}"
          cp -r results/* "gh_actions_results/run-${{ github.run_id }}/" 2>/dev/null || true
          git add "gh_actions_results/run-${{ github.run_id }}"
          if git diff --cached --quiet; then
            echo "nothing to commit (no result files produced)"
            exit 0
          fi
          git commit -m "GH Actions: vdw-sat-pipeline results (runner=${{ inputs.runner }}, run ${{ github.run_id }})"
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push origin main && break
            echo "push attempt $i failed, retrying..."; sleep 5
          done

  # Optional chaining: dispatch this same workflow again after collect,
  # but ONLY if no other run of it is already active. This is the fix for
  # the overlap problem -- the guard means a chain can never pile a second
  # run on top of one still going, and combined with the run-level
  # concurrency group above there is at most one live run at a time.
  # Uses GH_PAT, not GITHUB_TOKEN (GITHUB_TOKEN dispatches don't cascade).
  chain:
    needs: collect
    if: ${{ inputs.chain_shards != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: dispatch next run (guarded against overlap)
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          CHAIN_SHARDS: ${{ inputs.chain_shards }}
        run: |
          active=$(gh api \
            "repos/${{ github.repository }}/actions/workflows/sat_pipeline.yml/runs?per_page=50" \
            --jq "[.workflow_runs[] | select(.status==\"in_progress\" or .status==\"queued\") | select(.id != ${{ github.run_id }})] | length")
          if [ "$active" -gt 0 ]; then
            echo "another vdw-sat-pipeline run is active ($active); NOT chaining, to avoid overlap"
            exit 0
          fi
          gh workflow run sat_pipeline.yml \
            --repo ${{ github.repository }} \
            -f runner="${{ inputs.chain_runner }}" \
            -f shards="$CHAIN_SHARDS" \
            -f cap_seconds=${{ inputs.cap_seconds }} \
            -f timeout_minutes=${{ inputs.timeout_minutes }}
